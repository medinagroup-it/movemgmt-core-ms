name: Deploy Backend

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR image tag to deploy
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/move/deploy
            export MOVEMGMT_CORE_MS_IMAGE=ghcr.io/${{ github.repository }}/movemgmt-core-ms:${{ inputs.image_tag }}
            docker compose pull movemgmt-core-ms movemgmt-core-ms-migrate
            docker compose run --rm movemgmt-core-ms-migrate
            docker compose up -d movemgmt-core-ms

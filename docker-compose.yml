services:
  postgres:
    image: postgres:16-alpine
    container_name: movemgmtpg
    restart: unless-stopped
    environment:
      POSTGRES_USER: pgadmin
      POSTGRES_PASSWORD: pgmovemgmtdev26
      POSTGRES_DB: movemgmt
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
